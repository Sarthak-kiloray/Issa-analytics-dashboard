services:
  - type: web
    name: issa-analytics-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: OPENAI_MODEL
        value: gpt-5.5
      - key: ALLOWED_ORIGINS
        value: https://issaanalyticsdashboard.vercel.app
      - key: ALLOWED_ORIGIN_REGEX
        value: https://.*\.vercel\.app
      - key: ISSA_DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
